name: Nature-Client-Final-Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          # Sabse pehle sari files check karo logs mein
          ls
          # Spaces handle karne ke liye quotes ka use
          powershell "Expand-Archive -Path './*.zip' -DestinationPath '.' -Force"
          echo "Zip extracted successfully!"
          ls -Recurse

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if ($sln) {
            # Agar include path ka issue hai toh isse solve hoga
            msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:IncludePath="."
          } else {
            Write-Error "SLN file nahi mili extract hone ke baad!"
          }

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Nature-DLL
          path: "**/*.dll"
          
