name: Nature-Client-Final-Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          # Sabse pehle sari files check karo
          ls
          # Zip file ko forcefully dhoond kar extract karo
          $zipFile = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
          if ($zipFile) {
              powershell Expand-Archive -Path $zipFile.FullName -DestinationPath "." -Force
              echo "Zip extracted successfully!"
          } else {
              Write-Error "Bhai, repo mein koi .zip file nahi mili! Check karo main page par upload ki hai ya nahi."
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          if ($sln) {
            msbuild $sln.FullName /p:Configuration=Release /p:Platform=x64 /p:IncludePath="."
          } else {
            Write-Error "SLN file nahi mili extract hone ke baad!"
          }

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Nature-DLL
          path: "**/*.dll"
          
